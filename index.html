<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nSign URI Builder</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.5;
    }
    h1, h2 {
      margin-bottom: 12px;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .nested-card {
      border: 1px solid #e6e6e6;
      border-radius: 10px;
      padding: 16px;
      margin-top: 16px;
    }
    .nested-card h3,
    .nested-card h4 {
      margin-top: 0;
      margin-bottom: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .full {
      grid-column: 1 / -1;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input, select, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    small {
      color: #666;
      display: block;
      margin-top: 4px;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    button {
      padding: 12px 18px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .secondary {
      background: #eee;
    }
    .primary {
      background: #111;
      color: white;
    }
    .output {
      margin-top: 20px;
    }
    .error {
      color: #b00020;
      margin-top: 10px;
      font-weight: 600;
    }
    .hint {
      color: #555;
      font-size: 14px;
      margin-top: 8px;
    }
    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>nSign URI Builder</h1>

  <div class="card">
    <div class="grid">
      <div class="full">
        <label for="doc">Vstupní dokument *</label>
        <input id="doc" type="url" placeholder="https://example.com/file.pdf" required />
        <small>Povinné pole. Parametr <code>doc</code>.</small>
        <button type="button" id="sampleDocBtn" class="secondary" style="margin-top:8px">Vložit SAMPLE 10.pdf</button>
      </div>

      <div class="full">
        <label for="callback">Zpětná adresa</label>
        <input id="callback" type="url" placeholder="https://example.com/return" />
        <button type="button" id="sampleCallbackBtn" class="secondary" style="margin-top:8px">Propsat zpět do TESTY/nSign/SIGNED</button>
      </div>

      <div class="full">
        <h2>Příjemci</h2>
        <div id="recipientsContainer"></div>
        <button type="button" id="addRecipientBtn" class="secondary" style="margin-top:12px">Přidat příjemce</button>
      </div>

      <div>
        <label for="locale">Locale</label>
        <input id="locale" type="text" placeholder="cs-CZ" value="cs-CZ" />
      </div>

      <div>
        <label for="mode">Mode</label>
        <select id="mode">
          <option value="sign" selected>sign</option>
          <option value="prepare">prepare</option>
          <option value="view">view</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Signatáři</h2>
    <div id="signersContainer"></div>
    <button type="button" id="addSignerBtn" class="secondary" style="margin-top:12px">Přidat signatáře</button>
  </div>

  <div class="actions">
    <button type="button" class="secondary" id="clearBtn">Vyčistit</button>
    <button type="button" class="primary" id="generateBtn">Vygenerovat a otevřít</button>
  </div>

  <div class="output">
    <div id="error" class="error"></div>
    <div class="hint">Náhled vygenerovaného odkazu:</div>
    <textarea id="result" rows="6" readonly></textarea>
  </div>

  <script>
    const preferredBase = "https://nsign.nowatron.cz/sign";

    function buildUrl() {
      const doc = document.getElementById("doc").value.trim();
      const callback = document.getElementById("callback").value.trim();
      const locale = document.getElementById("locale").value.trim();
      const mode = document.getElementById("mode").value.trim();

      const errorEl = document.getElementById("error");
      errorEl.textContent = "";

      if (!doc) {
        errorEl.textContent = "Pole „Vstupní dokument“ je povinné.";
        return null;
      }

      const params = new URLSearchParams();
      params.append("v", "1");
      params.append("doc", doc);

      if (callback) params.append("callback", callback);
      if (locale) params.append("locale", locale);
      if (mode) params.append("mode", mode);

      const recipientSets = document.querySelectorAll(".recipient-set");
      recipientSets.forEach((set, index) => {
        const recipientNumber = index + 1;
        const name = set.querySelector('[data-field="recipient-name"]').value.trim();
        const email = set.querySelector('[data-field="recipient-email"]').value.trim();

        if (email) params.append(`rec${recipientNumber}`, email);
        if (name) params.append(`rec${recipientNumber}_name`, name);
      });

      const signerSets = document.querySelectorAll(".signer-set");
      signerSets.forEach((set, index) => {
        const signerNumber = index + 1;
        const name = set.querySelector('[data-field="signer-name"]').value.trim();
        const email = set.querySelector('[data-field="signer-email"]').value.trim();
        const role = set.querySelector('[data-field="signer-role"]').value.trim();

        if (name) params.append(`sgn${signerNumber}_name`, name);
        if (email) params.append(`sgn${signerNumber}_email`, email);
        if (role) params.append(`sgn${signerNumber}_rol`, role);

        const boxes = set.querySelectorAll('.signer-box-input');
        boxes.forEach((boxInput, boxIndex) => {
          const value = boxInput.value.trim();
          if (value) params.append(`sgn${signerNumber}_box${boxIndex + 1}`, value);
        });
      });

      return `${preferredBase}?${params.toString()}`;
    }

    function clearForm() {
      document.querySelectorAll("input, textarea").forEach(el => {
        if (el.id === "locale") {
          el.value = "cs-CZ";
        } else if (el.id === "result") {
          el.value = "";
        } else {
          el.value = "";
        }
      });

      document.querySelectorAll("select").forEach(el => {
        if (el.id === "mode") {
          el.value = "sign";
        } else {
          el.value = "";
        }
      });

      document.getElementById("recipientsContainer").innerHTML = "";
      document.getElementById("signersContainer").innerHTML = "";
      document.getElementById("error").textContent = "";
    }

    function createRecipientSet() {
      const container = document.getElementById("recipientsContainer");
      const recipientNumber = container.querySelectorAll(".recipient-set").length + 1;

      const wrapper = document.createElement("div");
      wrapper.className = "nested-card recipient-set";
      wrapper.innerHTML = `
        <h3>Příjemce ${recipientNumber}</h3>
        <div class="grid">
          <div>
            <label>Jméno příjemce e-mailu</label>
            <input type="text" data-field="recipient-name" placeholder="Např. Petr Krobot" />
          </div>
          <div>
            <label>E-mail příjemce</label>
            <input type="email" data-field="recipient-email" placeholder="napr. petr@firma.cz" />
            <button type="button" class="secondary sample-recipient-btn" style="margin-top:8px">Vložit email krobotak@gmail.com</button>
          </div>
        </div>
      `;

      wrapper.querySelector(".sample-recipient-btn").addEventListener("click", () => {
        wrapper.querySelector('[data-field="recipient-email"]').value = "krobotak@gmail.com";
        wrapper.querySelector('[data-field="recipient-name"]').value = "Petr Krobot";
      });

      container.appendChild(wrapper);
    }

    function addSignerBox(signerWrapper) {
      const boxesContainer = signerWrapper.querySelector(".signer-boxes-container");
      const boxNumber = boxesContainer.querySelectorAll(".signer-box-row").length + 1;

      const boxRow = document.createElement("div");
      boxRow.className = "signer-box-row";
      boxRow.style.marginTop = "12px";
      boxRow.innerHTML = `
        <label>Pozice pole číslo ${boxNumber}</label>
        <input type="text" class="signer-box-input" placeholder="120-540-180-50p1" />
        <small>Formát: X-Y-W-HpZ</small>
      `;

      boxesContainer.appendChild(boxRow);
    }

    function createSignerSet() {
      const container = document.getElementById("signersContainer");
      const signerNumber = container.querySelectorAll(".signer-set").length + 1;

      const wrapper = document.createElement("div");
      wrapper.className = "nested-card signer-set";
      wrapper.innerHTML = `
        <h3>Signatář ${signerNumber}</h3>
        <div class="grid">
          <div>
            <label>E-mail</label>
            <input type="email" data-field="signer-email" placeholder="napr. jan@firma.cz" />
          </div>
          <div>
            <label>Jméno</label>
            <input type="text" data-field="signer-name" placeholder="Např. Jan Novak" />
          </div>
          <div>
            <label>Role</label>
            <select data-field="signer-role">
              <option value="">-- nevyplněno --</option>
              <option value="signer">signer</option>
              <option value="approver">approver</option>
              <option value="viewer">viewer</option>
            </select>
          </div>
        </div>
        <div class="signer-boxes-container"></div>
        <button type="button" class="secondary add-signer-box-btn" style="margin-top:12px">Přidat podpisové pole</button>
      `;

      wrapper.querySelector(".add-signer-box-btn").addEventListener("click", () => {
        addSignerBox(wrapper);
      });

      addSignerBox(wrapper);
      container.appendChild(wrapper);
    }

    document.getElementById("clearBtn").addEventListener("click", clearForm);
    document.getElementById("addRecipientBtn").addEventListener("click", createRecipientSet);
    document.getElementById("addSignerBtn").addEventListener("click", createSignerSet);

    document.getElementById("generateBtn").addEventListener("click", () => {
      const url = buildUrl();
      if (!url) return;

      document.getElementById("result").value = url;

      // user gesture -> lepší šance, že iOS otevře appku
      window.location.href = url;
    });

    document.getElementById("sampleDocBtn").addEventListener("click", () => {
      document.getElementById("doc").value = "https://nowatroncz.sharepoint.com/:b:/s/RnD/IQChTQryO1cpTahPoaYk8P7bAQX_b7w44Yzmjmr0wTyD1ZE?e=Qh9MtZ";
    });

    document.getElementById("sampleCallbackBtn").addEventListener("click", () => {
      document.getElementById("callback").value = "https://nowatroncz.sharepoint.com/:f:/s/RnD/IgAMB7cOx6mLTqAUgkT1PN0YAX80n-tA40nUeflaqNmLb4A?e=oLv5gL";
    });
  </script>
</body>
</html>
